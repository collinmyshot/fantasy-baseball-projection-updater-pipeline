name: Daily Google Sheets Refresh (No Shiny)

on:
  workflow_dispatch:
  schedule:
    # Run once daily at 11:00 UTC (3 AM PST / 4 AM PDT).
    # Active Dec 24 – Apr 15 (Christmas Eve through Opening Day window).
    - cron: '0 11 24-31 12 *'   # Dec 24-31
    - cron: '0 11 * 1,2,3 *'    # Jan, Feb, Mar (all days)
    - cron: '0 11 1-15 4 *'     # Apr 1-15 (covers any Opening Day date)

permissions:
  contents: write

concurrency:
  group: daily-fangraphs-refresh
  cancel-in-progress: false

jobs:
  refresh_sheets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install R deps
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::jsonlite
            any::yaml
            any::googlesheets4

      - name: Write Google service account key
        env:
          GSHEETS_SERVICE_ACCOUNT_JSON: ${{ secrets.GSHEETS_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$GSHEETS_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing required secret: GSHEETS_SERVICE_ACCOUNT_JSON" >&2
            exit 1
          fi
          KEY_FILE="$RUNNER_TEMP/gsheets-service-account.json"
          printf '%s' "$GSHEETS_SERVICE_ACCOUNT_JSON" > "$KEY_FILE"
          echo "GSHEETS_SERVICE_ACCOUNT_FILE=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Run full pipeline
        run: Rscript scripts/run_pipeline.R --config config/pipeline.yml

      - name: Commit refreshed data
        run: |
          if [ -z "$(git status --porcelain data)" ]; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "chore: refresh fangraphs projections"
          git push
